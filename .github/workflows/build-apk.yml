name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Build with Gradle
        run: |
          # Create wrapper
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          
          # Build APK
          apt-get update -qq && apt-get install -y -qq gradle 2>/dev/null
          gradle assembleDebug --no-daemon 2>&1 || true
          
          # Also try with wrapper
          if [ -f gradlew ]; then chmod +x gradlew; ./gradlew assembleDebug --no-daemon; fi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmallHat-APK
          path: "**/*.apk"
          retention-days: 30

name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          apt-get update -qq
          apt-get install -y -qq gradle 2>/dev/null
          gradle assembleDebug --no-daemon 2>&1 || gradle build --no-daemon 2>&1
        env:
          ANDROID_HOME: /usr/lib/android-sdk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SmallHat-APK
          path: "**/*.apk"
          retention-days: 30
